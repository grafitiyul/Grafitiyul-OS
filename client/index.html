<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover lets the guide portal's fixed bottom nav extend
         under the iOS home indicator and pad itself with
         env(safe-area-inset-bottom). Harmless on non-notched devices. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#28a8a8" />
    <!-- PWA manifest. Served via express.static in production, no auth.
         No service worker is registered anywhere — the app stays
         online-only by design (see CLAUDE.md §15: no hidden stale
         caching). Installable yes; cached-offline no. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Favicons — real Grafitiyul Team logo (teal "Feel The Street"
         roundel), rasterised from client/src/public/assets/home/photos/
         logo.png. favicon.ico (16/32/48) covers legacy + the browser's
         automatic /favicon.ico probe; the sized PNGs give crisp tabs on
         modern browsers. All transparent. -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <!-- iOS install metadata. Apple touch icon is a 180×180 PNG on a
         solid white brand background (iOS turns any transparency black
         and rounds the corners itself). The two apple-* tags ask iOS to
         render the app in standalone (no Safari chrome) when launched
         from the home screen. -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Grafitiyul Team" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="default"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Fredoka — the PUBLIC website font (Latin + Hebrew). Loaded
         additively; the admin/learner/portal UI keeps using Heebo
         (font-sans). Google Fonts serves the Hebrew unicode-range block
         only when Hebrew glyphs are actually rendered. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Grafitiyul Team</title>
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }
      body {
        background: rgb(249 250 251);
        font-family: 'Heebo', system-ui, -apple-system, 'Segoe UI', Arial,
          sans-serif;
      }
      .gos-initial-loading {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #6b7280;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="gos-initial-loading">טוען…</div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
